<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Primary favicon ── -->
    <link rel="icon" type="image/png" href="/Acespire-logo.png" />
    <link rel="shortcut icon" href="/Acespire-logo.png" />

    <!-- ── Viewport & theme ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e1a" />

    <!-- ── SEO ── -->
    <title>Acespire Solutions | Enterprise IT, Supply Chain & Agentic AI Consulting</title>
    <meta name="description" content="Acespire Solutions delivers end-to-end enterprise IT consulting across Supply Chain, Data Integration, Cloud Technology, Digital Transformation, and Agentic AI — backed by purpose-built products like Provinyx, HireOn AI, DigiMark, and more." />
    <meta name="keywords" content="Acespire Solutions, enterprise IT consulting, supply chain consulting, digital transformation, data integration, cloud technology, agentic AI, HireOn AI, DigiMark, NexLead, Provinyx, ChainShields, Meeting Manager, Invoice Agent, SAP consulting, Blue Yonder, Bengaluru IT consulting" />
    <meta name="author" content="Acespire Solutions" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp previews) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://acespire.solutions/" />
    <meta property="og:title"       content="Acespire Solutions | Enterprise IT, Supply Chain & Agentic AI" />
    <meta property="og:description" content="End-to-end enterprise consulting across Supply Chain, Cloud, Data Integration, and Agentic AI — powered by proprietary products built from real-world experience." />
    <meta property="og:image"       content="/Acespire-logo.png" />
    <meta property="og:site_name"   content="Acespire Solutions" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X card ── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Acespire Solutions | Enterprise IT & Agentic AI Consulting" />
    <meta name="twitter:description" content="Supply Chain, Cloud, Data Integration, and Agentic AI consulting — backed by purpose-built enterprise products." />
    <meta name="twitter:image"       content="/Acespire-logo.png" />

    <!-- ── Apple / iOS home screen ── -->
    <link rel="apple-touch-icon" sizes="180x180" href="/Acespire-logo.png" />
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="Acespire" />

    <!-- ── Android / Chrome home screen ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/Acespire-logo.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/Acespire-logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Windows tile (Edge / IE pinned sites) ── -->
    <meta name="msapplication-TileImage" content="/Acespire-logo.png" />
    <meta name="msapplication-TileColor" content="#0a0e1a" />
    <meta name="msapplication-config"    content="none" />

    <!-- ── Canonical URL ── -->
    <link rel="canonical" href="https://acespire.solutions/" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
